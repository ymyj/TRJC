<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>耕地质量监测管理系统</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@4/lib/index.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        background-color: #F5F5F5;
        -webkit-font-smoothing: antialiased;
      }
      #app {
        max-width: 430px;
        margin: 0 auto;
        min-height: 100vh;
        background-color: #F5F5F5;
      }

      /* 全局样式变量 */
      :root {
        --primary-color: #4A90E2;
        --primary-gradient: linear-gradient(135deg, #4A90E2 0%, #357ABD 100%);
        --pending-color: #FF9500;
        --completed-color: #34C759;
        --in-progress-color: #007AFF;
        --to-submit-color: #FF3B30;
        --bg-color: #F5F5F5;
        --card-bg: #FFFFFF;
        --text-primary: #333333;
        --text-secondary: #666666;
        --text-tertiary: #999999;
      }

      /* 页面过渡动画 */
      .fade-enter-active, .fade-leave-active {
        transition: opacity 0.3s ease;
      }
      .fade-enter-from, .fade-leave-to {
        opacity: 0;
      }

      /* 列表项进入动画 */
      @keyframes slideInUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animated-item {
        animation: slideInUp 0.5s ease forwards;
        opacity: 0;
      }

      /* 首页样式 */
      .home-view {
        min-height: 100vh;
        background-color: var(--bg-color);
        padding-bottom: 20px;
      }

      /* 头部区域 */
      .header-section {
        background: var(--primary-gradient);
        padding: 20px 16px 30px;
        border-radius: 0 0 20px 20px;
      }

      /* 用户信息头部 */
      .user-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        overflow: hidden;
        border: 3px solid rgba(255, 255, 255, 0.3);
      }
      .avatar img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
      .user-detail {
        color: #fff;
      }
      .user-name {
        font-size: 18px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .status-dot {
        width: 8px;
        height: 8px;
        background-color: #4CD964;
        border-radius: 50%;
        display: inline-block;
      }
      .user-role {
        font-size: 13px;
        opacity: 0.9;
        margin-top: 4px;
      }
      .settings-btn {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background-color: rgba(255, 255, 255, 0.2);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: all 0.3s ease;
      }
      .settings-btn:active {
        background-color: rgba(255, 255, 255, 0.3);
        transform: scale(0.95);
      }

      /* 统计区域 */
      .stats-section {
        margin: -20px 16px 16px;
        background-color: var(--card-bg);
        border-radius: 12px;
        padding: 16px;
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
      }
      .section-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        margin-bottom: 12px;
      }
      .stats-cards {
        display: flex;
        gap: 12px;
      }
      .stat-card {
        flex: 1;
        text-align: center;
        padding: 16px 8px;
        border-radius: 10px;
        background-color: #f8f9fa;
        transition: transform 0.3s ease;
      }
      .stat-card:active {
        transform: scale(0.98);
      }
      .stat-card.pending {
        background-color: #FFF8F0;
      }
      .stat-card.pending .stat-number {
        color: var(--pending-color);
      }
      .stat-card.pending .stat-label {
        color: var(--pending-color);
      }
      .stat-card.completed {
        background-color: #F0FFF4;
      }
      .stat-card.completed .stat-number {
        color: var(--completed-color);
      }
      .stat-card.completed .stat-label {
        color: var(--completed-color);
      }
      .stat-card.to-submit {
        background-color: #FFF5F5;
      }
      .stat-card.to-submit .stat-number {
        color: var(--to-submit-color);
      }
      .stat-card.to-submit .stat-label {
        color: var(--to-submit-color);
      }
      .stat-number {
        font-size: 28px;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 6px;
      }
      .stat-label {
        font-size: 12px;
        font-weight: 500;
      }

      /* 任务列表区域 */
      .tasks-section {
        padding: 0 16px;
      }
      .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px
